blueprint:
  name: Adaptive Climate Setpoint (Forecast + Tibber Price)
  description: >
    Chooses heating, cooling, or off based on today's forecasted high relative
    to separate cooling/heating baselines, scales the target temperature by
    severity and electricity price, shuts off at night, during the dead band,
    or when the live outdoor temperature makes running pointless, and pauses
    itself for a configurable cooldown after any manual change at the device.
  domain: automation
  source_url: https://github.com/Irame/HomeAssistantBlueprints/blob/master/blueprints/automation/Irame/adaptive_climate_setpoint.yaml
  input:
    climate_entities:
      name: Climate Entities
      description: The climate devices this automation should control.
      selector:
        entity:
          domain: climate
          multiple: true

    weather_entity:
      name: Weather Entity
      description: Used to read today's forecasted high temperature.
      selector:
        entity:
          domain: weather

    price_sensor:
      name: Electricity Price Sensor
      description: >
        Your Tibber (or similar) current-price sensor. Must expose min_price
        and max_price attributes for today.
      selector:
        entity:
          domain: sensor

    outdoor_sensor:
      name: Outdoor Temperature Sensor
      description: Live outdoor temperature used for the real-time override.
      selector:
        entity:
          domain: sensor
          device_class: temperature

    cool_setpoint_min:
      name: Cooling Setpoint Min
      description: Most aggressive cooling target (coldest allowed) on the hottest days.
      default: 21
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box

    cool_setpoint_baseline:
      name: Cooling Setpoint Baseline
      description: Where cooling starts from (severity 0) once a day is classified as a cooling day.
      default: 24
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box

    heat_setpoint_baseline:
      name: Heating Setpoint Baseline
      description: Where heating starts from (severity 0) once a day is classified as a heating day.
      default: 21
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box

    heat_setpoint_max:
      name: Heating Setpoint Max
      description: Most aggressive heating target (warmest allowed) on the coldest days.
      default: 26
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box

    outdoor_hot_ref:
      name: Hot Day Reference
      description: Forecasted high at which cooling severity reaches maximum (1.0).
      default: 30
      selector:
        number:
          min: 20
          max: 45
          step: 1
          unit_of_measurement: "°C"
          mode: box

    outdoor_cold_ref:
      name: Cold Day Reference
      description: Forecasted high at which heating severity reaches maximum (1.0).
      default: 5
      selector:
        number:
          min: -20
          max: 15
          step: 1
          unit_of_measurement: "°C"
          mode: box

    price_weight:
      name: Electricity Price Influence
      description: 0 = ignore price entirely, 1 = full influence.
      default: 0.5
      selector:
        number:
          min: 0
          max: 1
          step: 0.1
          mode: slider

    night_start:
      name: Night Mode Start
      default: "22:00:00"
      selector:
        time: {}

    night_end:
      name: Night Mode End
      default: "06:00:00"
      selector:
        time: {}

    forecast_high_helper:
      name: Forecast High Storage Helper
      description: >
        An input_number helper used to store today's forecasted high once
        per day, so later-day logic isn't affected by forecasts drifting
        downward as the day progresses. Create one input_number helper and
        select it here.
      selector:
        entity:
          domain: input_number

    forecast_capture_time:
      name: Forecast Capture Time
      description: >
        Time of day to read and freeze the forecasted high. Pick an early
        time, before today's peak temperature typically occurs.
      default: "05:00:00"
      selector:
        time: {}

    manual_override_context_helper:
      name: Manual Override — Context Tracking Helper
      description: >
        An input_text helper (max length 255) used internally to remember
        this automation's own last context ID, so it can tell its own
        temperature/mode changes apart from a manual change at the device.
        Create one input_text helper and select it here. Do not share this
        helper between multiple instances of this blueprint.
      selector:
        entity:
          domain: input_text

    manual_override_timestamp_helper:
      name: Manual Override — Last Manual Change Helper
      description: >
        An input_datetime helper (date + time) used to store when a manual
        change was last detected. Create one input_datetime helper and
        select it here. Do not share this helper between multiple instances
        of this blueprint.
      selector:
        entity:
          domain: input_datetime

    manual_override_duration_minutes:
      name: Manual Override Cooldown (minutes)
      description: >
        How long the automation pauses itself after detecting a manual
        change to hvac_mode or target temperature at the device. Set to 0
        to disable this guard entirely.
      default: 60
      selector:
        number:
          min: 0
          max: 720
          step: 5
          unit_of_measurement: minutes
          mode: box

    door_window_sensors:
      name: Door/Window Sensors
      description: >
        Optional. If any of these is open, the climate device is forced off
        immediately — bypassing the manual override cooldown. Select binary_sensor entities (device
        class door or window). Leave empty if you don't have any.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    min_running_minutes:
      name: Minimum Running Time (minutes)
      description: >
        Once switched to heat or cool, won't switch back to off for at
        least this long. Set to 0 to disable.
      default: 3
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: minutes
          mode: box

    min_idle_minutes:
      name: Minimum Idle Time (minutes)
      description: >
        Once switched off, won't switch back to heat or cool for at least
        this long. Set to 0 to disable.
      default: 3
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: minutes
          mode: box

trigger:
  - id: refresh
    platform: time_pattern
    minutes: "/15"
  - id: refresh
    platform: state
    entity_id: !input price_sensor
  - id: refresh
    platform: state
    entity_id: !input outdoor_sensor
  - id: refresh
    platform: state
    entity_id: !input door_window_sensors
  - id: refresh
    platform: time
    at: !input night_start
  - id: refresh
    platform: time
    at: !input night_end
  - id: capture_forecast
    platform: time
    at: !input forecast_capture_time
  - id: capture_forecast
    platform: homeassistant
    event: start
  - id: climate_changed
    platform: state
    entity_id: !input climate_entities

trace:
  stored_traces: 20

condition: []

action:
  - choose:
      - conditions: "{{ trigger.id == 'capture_forecast' }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: forecast_result
          - variables:
              weather_entity_id: !input weather_entity
          - action: input_number.set_value
            target:
              entity_id: !input forecast_high_helper
            data:
              value: "{{ forecast_result[weather_entity_id]['forecast'][0]['temperature'] | float }}"

      - conditions: "{{ trigger.id == 'climate_changed' }}"
        sequence:
          - variables:
              context_helper_id: !input manual_override_context_helper
              timestamp_helper_id: !input manual_override_timestamp_helper
              relevant_change: >
                {{ trigger.from_state is not none and (
                     trigger.to_state.state != trigger.from_state.state
                     or trigger.to_state.attributes.get('temperature')
                        != trigger.from_state.attributes.get('temperature')
                   ) }}
              is_self_caused: >
                {{ trigger.to_state.context.parent_id is not none
                   and trigger.to_state.context.parent_id == states(context_helper_id) }}
          - choose:
              - conditions: "{{ relevant_change and not is_self_caused }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: !input manual_override_timestamp_helper
                    data:
                      timestamp: "{{ now().timestamp() }}"

      - conditions: "{{ trigger.id == 'refresh' }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: forecast_result
          - variables:
              forecast_high_helper_id: !input forecast_high_helper
              weather_entity_id: !input weather_entity
              price_sensor_id: !input price_sensor
              outdoor_sensor_id: !input outdoor_sensor
              context_helper_id: !input manual_override_context_helper
              timestamp_helper_id: !input manual_override_timestamp_helper
              override_duration_minutes: !input manual_override_duration_minutes
              climate_entities_list: !input climate_entities
              door_window_entities: !input door_window_sensors
              min_running_minutes: !input min_running_minutes
              min_idle_minutes: !input min_idle_minutes

              cool_setpoint_min: !input cool_setpoint_min
              cool_setpoint_baseline: !input cool_setpoint_baseline
              heat_setpoint_baseline: !input heat_setpoint_baseline
              heat_setpoint_max: !input heat_setpoint_max
              outdoor_hot_ref: !input outdoor_hot_ref
              outdoor_cold_ref: !input outdoor_cold_ref
              price_weight: !input price_weight

              manual_override_active: >
                {{ (as_timestamp(now()) - as_timestamp(states(timestamp_helper_id), 0))
                   < (override_duration_minutes * 60) }}

              max_temp_today: "{{ states(forecast_high_helper_id) | float }}"
              max_temp_today_from_now: "{{ forecast_result[weather_entity_id]['forecast'][0]['temperature'] | float }}"
              current_outdoor_temp: "{{ states(outdoor_sensor_id) | float(0) }}"

              current_price: "{{ states(price_sensor_id) | float(0) }}"
              min_price: "{{ state_attr(price_sensor_id, 'min_price') | float(0) }}"
              max_price: "{{ state_attr(price_sensor_id, 'max_price') | float(1) }}"

              day_type: >
                {% if max_temp_today > cool_setpoint_baseline %}
                  cool
                {% elif max_temp_today < heat_setpoint_baseline %}
                  heat
                {% else %}
                  off
                {% endif %}

              raw_severity: >
                {% if day_type == 'cool' %}
                  {{ ((max_temp_today_from_now - cool_setpoint_baseline) / (outdoor_hot_ref - cool_setpoint_baseline)) }}
                {% elif day_type == 'heat' %}
                  {{ ((heat_setpoint_baseline - max_temp_today_from_now) / (heat_setpoint_baseline - outdoor_cold_ref)) }}
                {% else %}
                  0
                {% endif %}
              severity: "{{ [[raw_severity | float, 0] | max, 1] | min }}"

              price_factor: >
                {{ ((current_price - min_price) / ((max_price - min_price) if max_price != min_price else 1)) }}
              price_factor_clamped: "{{ [[price_factor | float, 0] | max, 1] | min }}"

              dampening: "{{ 1 - (price_weight * price_factor_clamped) }}"
              effective_severity: "{{ [[(severity * dampening) | float, 0] | max, 1] | min }}"

              target_temp_raw: >
                {% if day_type == 'cool' %}
                  {{ cool_setpoint_baseline - effective_severity * (cool_setpoint_baseline - cool_setpoint_min) }}
                {% elif day_type == 'heat' %}
                  {{ heat_setpoint_baseline + effective_severity * (heat_setpoint_max - heat_setpoint_baseline) }}
                {% else %}
                  {{ cool_setpoint_baseline }}
                {% endif %}
              target_temp: "{{ ((target_temp_raw | float * 2) | round(0) / 2) }}"

              night_start_str: !input night_start
              night_end_str: !input night_end
              night_start_t: "{{ strptime(night_start_str, '%H:%M:%S').time() }}"
              night_end_t: "{{ strptime(night_end_str, '%H:%M:%S').time() }}"
              now_t: "{{ now().time() }}"
              is_night: >
                {% if night_start_t <= night_end_t %}
                  {{ night_start_t <= now_t < night_end_t }}
                {% else %}
                  {{ now_t >= night_start_t or now_t < night_end_t }}
                {% endif %}

              outdoor_override_off: >
                {% if day_type == 'cool' %}
                  {{ current_outdoor_temp <= cool_setpoint_baseline }}
                {% elif day_type == 'heat' %}
                  {{ current_outdoor_temp >= heat_setpoint_baseline }}
                {% else %}
                  false
                {% endif %}

              window_open: >
                {{ door_window_entities | length > 0
                   and (expand(door_window_entities) | selectattr('state', 'eq', 'on') | list | count) > 0 }}

              should_be_off: "{{ window_open or is_night or day_type == 'off' or outdoor_override_off }}"

              first_climate_entity: "{{ climate_entities_list[0] }}"
              current_mode: "{{ states(first_climate_entity) }}"
              is_currently_off: "{{ current_mode == 'off' }}"
              seconds_in_current_state: >
                {{ (as_timestamp(now()) - as_timestamp(states[first_climate_entity].last_changed)) }}

              min_run_elapsed: "{{ seconds_in_current_state >= (min_running_minutes | float * 60) }}"
              min_idle_elapsed: "{{ seconds_in_current_state >= (min_idle_minutes | float * 60) }}"

              timing_guard_ok: >
                {% if should_be_off %}
                  {{ is_currently_off or min_run_elapsed }}
                {% else %}
                  {{ (not is_currently_off) or min_idle_elapsed }}
                {% endif %}

              execute_now: "{{ (window_open or not manual_override_active) and timing_guard_ok }}"

          - choose:
              - conditions: "{{ window_open }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: !input manual_override_timestamp_helper
                    data:
                      timestamp: "{{ 0 }}"

          - choose:
              - conditions: "{{ execute_now }}"
                sequence:
                  - action: input_text.set_value
                    target:
                      entity_id: !input manual_override_context_helper
                    data:
                      value: "{{ this.context.id }}"
                  - choose:
                      - conditions: "{{ should_be_off }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input climate_entities
                            data:
                              hvac_mode: "off"
                      - conditions: "{{ not should_be_off and day_type == 'cool' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input climate_entities
                            data:
                              hvac_mode: cool
                          - action: climate.set_temperature
                            target:
                              entity_id: !input climate_entities
                            data:
                              temperature: "{{ target_temp }}"
                      - conditions: "{{ not should_be_off and day_type == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input climate_entities
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: !input climate_entities
                            data:
                              temperature: "{{ target_temp }}"

mode: single
